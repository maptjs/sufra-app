name: sufra
description: "سُفرة — ماسح غذاء الأسرة. Scan your family's food for nutrition, allergens, and safety, instantly, in Arabic."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6
  mobile_scanner: ^5.2.3
  http: ^1.2.2
  shared_preferences: ^2.3.2
  audioplayers: ^6.1.0
  uuid: ^4.5.1
  intl: ^0.20.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: false 
  image_path: assets/icon/app_icon.png
  min_sdk_android: 21
  adaptive_icon_background: "#F3CBAA"
  adaptive_icon_foreground: assets/icon/app_icon_foreground.png
